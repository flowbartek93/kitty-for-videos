name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      NX_PACKAGE_MANAGER: npm
      NX_NO_CLOUD: true # <--- KLUCZOWE: WYŁĄCZAMY BLOKADĘ NX CLOUD
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies 🔧
        run: npm install --legacy-peer-deps

      - name: Build Application 🏗️
        run: |
          # Dodajemy flagę --skip-nx-cache, aby upewnić się, że budujemy na czysto bez Clouda
          npx nx build team-fundraiser --configuration=production --base-href=/kitty-for-videos/ --skip-nx-cache
          cp dist/apps/team-fundraiser/browser/index.html dist/apps/team-fundraiser/browser/404.html

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/apps/team-fundraiser/browser
          branch: gh-pages
          clean: true
