<div
  class="fixed inset-0 z-100 flex items-center justify-center bg-black/70 backdrop-blur-sm animate-in fade-in duration-150"
  (click)="cancel()"
>
  <div
    class="w-full max-w-sm mx-4 bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-2xl animate-in zoom-in-95 duration-150"
    (click)="$event.stopPropagation()"
  >
    <h3 class="text-sm font-black uppercase tracking-[0.2em] text-red-400">
      {{ title() }}
    </h3>
    <p class="mt-3 text-sm text-zinc-400">
      {{ message() }}
    </p>

    <div class="mt-6 flex gap-3">
      <button
        (click)="cancel()"
        class="flex-1 py-3 bg-zinc-800 text-zinc-300 text-xs font-black uppercase tracking-[0.2em] rounded-xl hover:bg-zinc-700 hover:text-white transition-all border border-zinc-700"
      >
        {{ cancelLabel() }}
      </button>
      <button
        (click)="confirm()"
        class="flex-1 py-3 bg-red-950 text-red-400 text-xs font-black uppercase tracking-[0.2em] rounded-xl border border-red-700/60 hover:bg-red-900 hover:text-red-300 hover:border-red-500 transition-all"
      >
        {{ confirmLabel() }}
      </button>
    </div>
  </div>
</div>
