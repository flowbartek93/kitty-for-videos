@if (message()) {
  <div class="toast toast-bottom toast-center z-100 mb-10">
    <div
      class="alert alert-error bg-error/80 backdrop-blur-md shadow-2xl border-2 border-white/10 animate-in fade-in slide-in-from-right-10 duration-300"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"
        />
      </svg>

      <div class="flex flex-col">
        <span class="font-black text-[10px] uppercase tracking-[0.2em] opacity-70 leading-none mb-1"> Błąd </span>
        <span class="text-sm font-semibold italic">
          {{ message() }}
        </span>
      </div>

      <button (click)="dismiss()" class="btn btn-ghost btn-xs btn-circle ml-2">✕</button>
    </div>
  </div>
}
