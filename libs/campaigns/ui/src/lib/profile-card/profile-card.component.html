<div
  class="bg-slate-900 border border-slate-800 rounded-[2rem] p-6 flex items-center gap-4 shadow-lg h-full transition-all hover:border-indigo-500/30 group"
>
  <div class="avatar placeholder">
    <div
      class="bg-indigo-600 text-white rounded-full w-14 h-14 ring ring-indigo-500/20 group-hover:scale-105 transition-transform duration-300 flex items-center justify-center"
    >
      <span class="text-xl font-black uppercase tracking-tighter"
        >{{ name()[0] }}</span
      >
    </div>
  </div>

  <div class="flex flex-col">
    <span
      class="text-[10px] opacity-40 uppercase tracking-widest font-bold text-indigo-400"
      >Zalogowany jako</span
    >
    <span class="text-xl font-black text-slate-100 tracking-tight"
      >{{ name() }}</span
    >
  </div>

  <div class="ml-auto">
    <div
      class="w-2 h-2 bg-emerald-500 rounded-full shadow-[0_0_8px_rgba(16,185,129,0.6)] animate-pulse"
    ></div>
  </div>
</div>
