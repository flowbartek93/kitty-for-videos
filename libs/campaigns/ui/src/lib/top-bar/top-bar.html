<div class="navbar bg-base-200 border-b border-neutral h-20 px-10 gap-8">
  <div class="flex-1">
    <div class="relative w-full max-w-2xl group">
      <span
        class="absolute inset-y-0 left-4 flex items-center text-slate-500 group-focus-within:text-primary transition-colors"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
          />
        </svg>
      </span>

      <input
        type="text"
        placeholder="Szukaj zrzutki..."
        class="input bg-base-100 border-neutral w-full pl-12 rounded-2xl focus:border-primary focus:outline-none text-slate-200 placeholder:text-slate-600 transition-all"
      />
    </div>
  </div>

  <div class="flex items-center gap-6">
    <button class="btn btn-ghost btn-circle text-slate-400 hover:text-white">
      <div class="indicator">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
          />
        </svg>
        <span class="badge badge-xs badge-primary indicator-item"></span>
      </div>
    </button>

    <div class="flex items-center gap-4 pl-4 border-l border-neutral">
      <div class="text-right hidden md:block">
        <div class="text-sm font-black text-white leading-none mb-1">{{currentUser()}}</div>
        <div class="flex items-center justify-end gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-success animate-pulse"></span>
          <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Online</span>
        </div>
      </div>

      <div class="dropdown dropdown-end">
        <div tabindex="0" role="button" class="avatar cursor-pointer">
          <div
            class="w-11 h-11 rounded-2xl ring ring-neutral ring-offset-base-200 ring-offset-2 hover:ring-primary transition-all"
          >
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Hubert" alt="Hubert Avatar" />
          </div>
        </div>
        <ul
          tabindex="0"
          class="dropdown-content menu bg-base-200 border border-neutral rounded-2xl w-48 p-2 mt-3 shadow-xl z-50"
        >
          <li class="menu-title text-[10px] text-slate-500 uppercase tracking-widest px-3 pb-1">Konto</li>
          <li>
            <a class="rounded-xl text-slate-300 hover:text-white hover:bg-base-100">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                />
              </svg>
              Profil
            </a>
          </li>
          <li>
            <a class="rounded-xl text-slate-300 hover:text-white hover:bg-base-100">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
                />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                />
              </svg>
              Ustawienia
            </a>
          </li>
          <li class="mt-1">
            <a (click)="logout()" class="rounded-xl text-error hover:text-error hover:bg-error/10">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
                />
              </svg>
              Wyloguj
            </a>
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>
