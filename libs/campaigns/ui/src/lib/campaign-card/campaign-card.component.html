<div
  class="bg-slate-900/50 border border-slate-800 rounded-[2rem] p-6 hover:border-indigo-500/50 transition-all flex items-center justify-between group cursor-pointer shadow-xl"
>
  <div class="flex flex-col gap-1 text-left">
    <h3 class="font-bold text-xl group-hover:text-indigo-400 transition-colors">
      {{ campaign().title }}
    </h3>
    <div class="flex gap-2">
      <span class="badge badge-ghost badge-sm opacity-40 font-mono uppercase">{{ campaign().status }}</span>
    </div>
    ł
  </div>

  <div class="flex flex-col items-end gap-2 text-right">
    <div class="text-indigo-400 font-black text-lg">{{ progress() }}%</div>
    <progress class="progress progress-primary w-32 h-2" [value]="progress()" max="100"></progress>
    <div class="text-[10px] opacity-30 font-mono">TARGET: {{ campaign().totalCostUSD }} USD</div>
  </div>
</div>
