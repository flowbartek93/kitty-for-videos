<div class="max-w-7xl mx-auto space-y-8 animate-in fade-in duration-700">
  <header class="flex flex-col md:flex-row justify-between items-end gap-6">
    <div class="space-y-1">
      <h1 class="text-3xl font-black tracking-tighter text-white uppercase italic">Centrum Rozpoznania</h1>
      <p class="text-zinc-500 text-sm font-mono uppercase tracking-widest">Aktywne misje i zbiórki szkoleniowe</p>
    </div>

    <div class="relative w-full md:w-96 group">
      <div
        class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-zinc-500 group-focus-within:text-indigo-400 transition-colors"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
          ></path>
        </svg>
      </div>
      <input
        type="text"
        placeholder="Szukaj kryptonimu lub instruktora..."
        class="w-full bg-zinc-900/50 border border-zinc-800 text-white text-sm rounded-xl py-3 pl-10 pr-4 focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder:text-zinc-600 font-mono"
      />
    </div>
  </header>

  <nav class="flex flex-wrap gap-2">
    <button class="px-4 py-1.5 rounded-full bg-indigo-600 text-white text-xs font-bold uppercase tracking-widest">
      Wszystkie
    </button>
    <button
      class="px-4 py-1.5 rounded-full bg-zinc-900 border border-zinc-800 text-zinc-400 text-xs font-bold uppercase tracking-widest hover:border-zinc-600 transition-all"
    >
      CQB / Taktyka
    </button>
    <button
      class="px-4 py-1.5 rounded-full bg-zinc-900 border border-zinc-800 text-zinc-400 text-xs font-bold uppercase tracking-widest hover:border-zinc-600 transition-all"
    >
      Strzelectwo
    </button>
    <button
      class="px-4 py-1.5 rounded-full bg-zinc-900 border border-zinc-800 text-zinc-400 text-xs font-bold uppercase tracking-widest hover:border-zinc-600 transition-all"
    >
      Medycyna Polowa
    </button>
    <button
      class="px-4 py-1.5 rounded-full bg-zinc-900 border border-zinc-800 text-zinc-400 text-xs font-bold uppercase tracking-widest hover:border-zinc-600 transition-all"
    >
      Survival / SERE
    </button>
  </nav>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    @for (campaign of campaigns(); track campaign.id) {
      <lib-course-card [campaign]="campaign" />
    } @empty {
      <div class="col-span-full border border-dashed border-zinc-800 rounded-xl p-12 text-center">
        <p class="text-zinc-500 font-mono uppercase text-xs tracking-widest">
          Sektor czysty. Brak aktywnych zrzutek szkoleniowych.
        </p>
      </div>
    }
  </div>
</div>
