<article
  class="group bg-zinc-900/40 border border-zinc-800 rounded-2xl overflow-hidden hover:border-indigo-500/50 transition-all flex flex-col"
>
  <div class="relative h-48 bg-zinc-800 overflow-hidden">
    @if (campaign().previewImageUrl) {
      <img [src]="campaign().previewImageUrl" [alt]="campaign().title" class="w-full h-full object-cover" />
    }
    <div class="absolute inset-0 bg-gradient-to-t from-zinc-900 to-transparent opacity-60"></div>
    <span
      class="absolute top-4 left-4 px-2 py-1 bg-indigo-600 text-[10px] font-black uppercase tracking-tighter rounded"
      >{{ campaign().status }}</span
    >
  </div>

  <div class="p-6 flex-1 flex flex-col">
    <h3 class="text-xl font-bold text-white group-hover:text-indigo-400 transition-colors">
      {{ campaign().title }}
    </h3>
    <p class="mt-2 text-zinc-500 text-sm line-clamp-2">
      {{ campaign().description }}
    </p>

    <div class="mt-auto pt-6 space-y-2">
      <div class="flex justify-between items-end">
        <div class="space-y-0.5">
          <p class="text-[10px] uppercase font-bold text-zinc-500 tracking-widest">Cel</p>
          <p class="text-lg font-black text-white italic">
            {{ campaign().totalCostUSD }} <span class="text-xs font-normal text-zinc-500">USD</span>
          </p>
        </div>
        @if (campaign().deadline) {
          <div class="text-right">
            <p class="text-[10px] text-zinc-600 uppercase font-bold tracking-tighter">
              Deadline: {{ campaign().deadline }}
            </p>
          </div>
        }
      </div>
    </div>

    <button
      class="w-full mt-6 py-3 bg-zinc-800 text-white text-xs font-black uppercase tracking-[0.2em] rounded-xl hover:bg-indigo-600 transition-all border border-zinc-700 hover:border-indigo-400 group-hover:shadow-lg"
    >
      Wesprzyj Misję
    </button>
  </div>
</article>
