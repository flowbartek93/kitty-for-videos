<section class="space-y-4" aria-labelledby="active-deployments-heading">
  <h2 id="active-deployments-heading" class="text-xs font-bold text-zinc-500 uppercase tracking-[0.3em] px-1">
    Wspierane operacje (Deployments)
  </h2>

  @for (campaign of supportedCampaigns(); track campaign.id) {
    <lib-contribution-course-card [campaign]="campaign" />
  } @empty {
    <div class="col-span-full border border-dashed border-zinc-800 rounded-xl p-12 text-center">
      <p class="text-zinc-500 font-mono uppercase text-xs tracking-widest">
        Brak wspieranych misji. Wesprzyj pierwszą inicjatywę w sekcji Odkrywaj.
      </p>
    </div>
  }
</section>
