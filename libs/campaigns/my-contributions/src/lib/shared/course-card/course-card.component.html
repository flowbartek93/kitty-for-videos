<article class="group bg-zinc-900/20 border border-zinc-800 rounded-2xl p-6 hover:bg-zinc-900/40 transition-all">
  <div class="flex flex-col md:flex-row gap-6 items-center">
    <div
      class="w-full md:w-32 h-24 bg-zinc-800 rounded-lg overflow-hidden shrink-0 border border-zinc-700"
      aria-hidden="true"
    >
      @if (campaign().previewImageUrl) {
        <img [src]="campaign().previewImageUrl" [alt]="campaign().title" class="w-full h-full object-cover" />
      } @else {
        <div class="w-full h-full bg-gradient-to-br from-indigo-900/40 to-zinc-800 flex items-center justify-center">
          <svg class="w-8 h-8 text-indigo-500/50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
      }
    </div>

    <div class="flex-1 space-y-2 w-full">
      <div class="flex justify-between items-start">
        <div>
          <h3
            class="text-lg font-bold text-white group-hover:text-indigo-400 transition-colors italic uppercase tracking-tight"
          >
            {{ campaign().title }}
          </h3>
          <p class="text-xs text-zinc-500 font-mono">
            Status:
            <span
              class="uppercase tracking-widest font-bold text-[10px]"
              [class.text-green-500]="campaign().status === 'active'"
              [class.text-indigo-400]="campaign().status === 'finalized'"
              >{{ campaign().status }}</span
            >
          </p>
        </div>
        <div class="text-right">
          <p class="text-xs text-zinc-500 uppercase font-bold tracking-tighter italic">Koszt:</p>
          <p class="text-lg font-black text-white">{{ campaign().totalCostUSD }} {{ campaign().currency }}</p>
        </div>
      </div>
    </div>

    <div class="flex gap-2 w-full md:w-auto justify-end">
      @if (campaign().videoUrl) {
        <a
          [href]="campaign().videoUrl"
          target="_blank"
          rel="noopener noreferrer"
          [attr.aria-label]="'Otwórz źródło misji ' + campaign().title"
          class="p-3 bg-zinc-800 text-zinc-300 rounded-xl hover:bg-zinc-700 hover:text-white transition-colors border border-zinc-700"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
            />
          </svg>
        </a>
      }
    </div>
  </div>
</article>
