<div class="max-w-6xl mx-auto animate-in slide-in-from-bottom-4 duration-500">
  <div class="flex flex-col gap-8 md:flex-row">
    <aside class="w-full md:w-64 space-y-2">
      <nav class="flex flex-row md:flex-col gap-1 overflow-x-auto">
        <a
          [routerLink]="['security']"
          class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-white bg-indigo-600/10 border-l-2 border-indigo-500 rounded-r-lg group"
        >
          <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
            ></path>
          </svg>
          Bezpieczeństwo (OpSec)
        </a>
        <a
          [routerLink]="['notifications']"
          class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-800/50 transition-all rounded-lg group"
        >
          <svg class="w-5 h-5 group-hover:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
            ></path>
          </svg>
          Powiadomienia
        </a>
        <a
          [routerLink]="['payments']"
          class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-800/50 transition-all rounded-lg group"
        >
          <svg class="w-5 h-5 group-hover:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 10h18M7 15h1m4 0h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"
            ></path>
          </svg>
          Płatności
        </a>
      </nav>
    </aside>

    <main class="flex-1 space-y-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
