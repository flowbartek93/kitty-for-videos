<div
  class="max-w-4xl mx-auto p-6 bg-slate-950 text-slate-200 border border-slate-800 rounded-sm shadow-2xl animate-in fade-in duration-500"
>
  <header class="mb-8 border-b border-slate-800 pb-4 flex justify-between items-end">
    <div>
      <h1 class="text-2xl font-black tracking-tighter uppercase text-white">
        Profil Operatora: <span class="text-emerald-500">Edit Mode</span>
      </h1>
      <p class="text-slate-500 text-sm italic font-mono">SOP: Modyfikacja parametrów jednostki.</p>
    </div>
    <div class="text-[10px] text-zinc-500 font-mono uppercase">
      Status: <span class="text-emerald-500 animate-pulse">Configuring...</span>
    </div>
  </header>

  <form [formGroup]="profileForm" (ngSubmit)="saveProfile()" class="space-y-8">
    <section class="grid grid-cols-1 md:grid-cols-3 gap-6 items-center border-b border-slate-800/50 pb-8">
      <div class="col-span-1">
        <h3 class="text-indigo-500 font-bold uppercase text-xs tracking-widest text-opacity-90">
          00. Identyfikacja Wizualna
        </h3>
        <p class="text-slate-500 text-xs mt-1">Kliknij w obraz, aby załadować nowe dane biometryczne (JPG/PNG).</p>
      </div>

      <div class="md:col-span-2 flex justify-center md:justify-start">
        <div class="relative group">
          <div
            class="w-32 h-32 p-1 border-2 border-indigo-500 rounded-full relative overflow-hidden bg-zinc-900 shadow-[0_0_15px_rgba(99,102,241,0.2)] transition-all group-hover:border-emerald-500 group-hover:shadow-[0_0_20px_rgba(16,185,129,0.3)]"
          >
            <img
              [src]="avatarPreview() || store.avatarUrl()"
              alt="Preview"
              class="object-cover w-full h-full rounded-full transition-transform duration-500 group-hover:scale-110"
            />

            <label
              for="avatar-input"
              class="absolute inset-0 flex flex-col items-center justify-center bg-black/70 opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-6 w-6 text-emerald-500 mb-1"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"
                />
              </svg>
              <span class="text-[8px] font-black uppercase text-white tracking-tighter">Upload Intel</span>
            </label>
          </div>

          <input id="avatar-input" type="file" class="hidden" accept="image/*" (change)="handleAvatarChange($event)" />

          <span class="absolute bottom-2 right-2 flex h-4 w-4">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-4 w-4 bg-emerald-500 border-2 border-slate-950"></span>
          </span>
        </div>
      </div>
    </section>

    <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="col-span-1">
        <h3 class="text-emerald-500 font-bold uppercase text-xs tracking-widest">01. Dane Operacyjne</h3>
        <p class="text-slate-500 text-xs mt-1">Pseudonim używany podczas transmisji danych.</p>
      </div>

      <div class="md:col-span-2 space-y-4">
        <div>
          <label for="callsign-input" class="block text-[10px] uppercase font-bold text-slate-400 mb-1"
            >Callsign (Pseudonim)</label
          >
          <input
            id="callsign-input"
            type="text"
            formControlName="callsign"
            class="w-full bg-slate-900 border border-slate-700 p-2 text-white focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all outline-none font-mono"
          />
        </div>
      </div>
    </section>

    <footer class="pt-6 flex justify-end space-x-4 border-t border-slate-800">
      <button
        type="button"
        routerLink="/user-info"
        class="px-6 py-2 text-xs font-bold uppercase tracking-widest text-slate-500 hover:text-white transition-colors"
      >
        Aborduj (Anuluj)
      </button>
      <button
        type="submit"
        [disabled]="profileForm.invalid"
        class="px-8 py-2 bg-emerald-600 hover:bg-emerald-500 disabled:bg-slate-900 disabled:text-slate-700 disabled:border-slate-800 border border-emerald-500 text-white font-black uppercase tracking-tighter transition-all shadow-[4px_4px_0px_0px_rgba(16,185,129,0.2)] active:shadow-none active:translate-x-0.5 active:translate-y-0.5"
      >
        Zapisz Profil (Commit)
      </button>
    </footer>
  </form>
</div>
