<div class="min-h-screen bg-base-100 flex items-center justify-center p-6">
  <div class="w-full max-w-md bg-base-200 border border-neutral rounded-[2.5rem] p-10 shadow-2xl">
    <div class="flex flex-col items-center mb-10">
      <div class="w-14 h-14 bg-primary rounded-2xl flex items-center justify-center shadow-lg shadow-primary/20 mb-4">
        <span class="text-white font-black italic text-2xl">T</span>
      </div>
      <h1 class="text-2xl font-black text-white">Witaj ponownie</h1>
      <p class="text-slate-500 text-sm">Zaloguj się do swojego portalu</p>
    </div>

    <form class="space-y-4" (submit)="handleLogin($event)">
      <div class="form-control">
        <label class="label"><span class="label-text font-bold text-slate-400">Email</span></label>
        <input
          #email
          type="email"
          class="input bg-base-100 border-neutral rounded-2xl focus:border-primary"
          placeholder="hubert@teamfund.pl"
          required
        />
      </div>

      <div class="form-control">
        <label class="label"><span class="label-text font-bold text-slate-400">Hasło</span></label>
        <input
          #password
          type="password"
          class="input bg-base-100 border-neutral rounded-2xl focus:border-primary"
          placeholder="••••••••"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary w-full rounded-2xl font-black mt-6 shadow-lg shadow-primary/20">
        ZALOGUJ SIĘ
      </button>
    </form>
  </div>
</div>
