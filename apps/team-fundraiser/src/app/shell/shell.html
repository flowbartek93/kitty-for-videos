<div class="flex h-screen w-full bg-slate-650 overflow-hidden">
  <!-- sidebar -->
  <lib-sidebar></lib-sidebar>

  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <header>
      <!-- szukajka + avatar -->
      <lib-top-bar
        [avatarUrl]="avatarUrl()"
        [currentProfile]="currentProfile()"
        (logoutClicked)="logout()"
      ></lib-top-bar>
    </header>

    <main
      class="flex-1 overflow-y-auto pl-2 pr-4 py-4 sm:pl-3 sm:pr-6 sm:py-5 lg:pl-4 lg:pr-8 lg:py-6 custom-scrollbar"
    >
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
